<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎮 Quest Log</h1>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter your quest...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <div class="xp-box">
        <p>XP: <span id="xp">0</span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
